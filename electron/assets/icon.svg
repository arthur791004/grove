<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark squircle, matches Grove's UI bg. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#83C2D7"/>
      <stop offset="100%" stop-color="#3FB1A0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner border to lift the squircle. -->
  <rect x="12" y="12" width="1000" height="1000" rx="212" ry="212"
        fill="none" stroke="#30363d" stroke-width="2" opacity="0.45"/>

  <!-- Grove of three trees: center tall, two flanking shorter. -->
  <g transform="translate(512 540)" fill="url(#leaf)">
    <!-- Left tree -->
    <g transform="translate(-220 60)">
      <path d="M0 -180
               C -110 -140 -130 -20 -80 30
               C -130 70 -110 160 0 180
               C 110 160 130 70 80 30
               C 130 -20 110 -140 0 -180 Z"/>
      <rect x="-22" y="180" width="44" height="120" rx="8"/>
    </g>

    <!-- Center tree (taller) -->
    <g transform="translate(0 -20)">
      <path d="M0 -260
               C -140 -220 -170 -60 -110 0
               C -180 50 -150 180 0 220
               C 150 180 180 50 110 0
               C 170 -60 140 -220 0 -260 Z"/>
      <rect x="-28" y="220" width="56" height="160" rx="10"/>
    </g>

    <!-- Right tree -->
    <g transform="translate(220 60)">
      <path d="M0 -180
               C -110 -140 -130 -20 -80 30
               C -130 70 -110 160 0 180
               C 110 160 130 70 80 30
               C 130 -20 110 -140 0 -180 Z"/>
      <rect x="-22" y="180" width="44" height="120" rx="8"/>
    </g>
  </g>

  <!-- Prompt chevron, white. Placed at the center tree's base like a glyph. -->
  <path d="M 460 470 L 540 540 L 460 610"
        fill="none" stroke="#f0f6fc" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
